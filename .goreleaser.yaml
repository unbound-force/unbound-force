# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

builds:
  - id: unbound-force
    main: ./cmd/unbound-force
    binary: unbound-force
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}

archives:
  - formats:
      - tar.gz
    name_template: >-
      unbound-force_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

sboms:
  - id: archive
    artifacts: archive
  - id: source
    artifacts: source

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    artifacts: checksum
    output: true
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes

changelog:
  sort: asc
  use: github
  format: "{{ .SHA }}: {{ .Message }} ({{ with .AuthorUsername }}@{{ . }}{{ else }}{{ .AuthorName }}{{ end }})"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 100
    - title: Security Updates
      regexp: '^.*?sec(\([[:word:]]+\))??!?:.+$'
      order: 150
    - title: Bug Fixes
      regexp: '^.*?(fix|refactor)(\([[:word:]]+\))??!?:.+$'
      order: 200
    - title: Dependency Updates
      regexp: '^.*chore\(deps\):.*$'
      order: 250
    - title: Infrastructure Updates
      regexp: '^.*ci(\(.*\))?:.*$'
      order: 300
    - title: Documentation Updates
      regexp: '^.*?docs?(\([[:word:]]+\))??!?:.+$'
      order: 400
    - title: Other Work
      order: 9999
  filters:
    exclude:
      - '^chore(?!\(deps\)):'
      - '^test:'
      - Merge pull request

nfpms:
  - id: unbound-force
    package_name: unbound-force
    vendor: Unbound Force
    homepage: "https://github.com/unbound-force/unbound-force"
    maintainer: "Unbound Force <team@unboundforce.dev>"
    description: "Unbound Force specification framework toolkit"
    license: Apache-2.0
    formats:
      - rpm
    bindir: /usr/bin
    contents:
      - src: /usr/bin/unbound-force
        dst: /usr/bin/uf
        type: symlink

brews:
  - name: unbound-force
    description: "Unbound Force specification framework toolkit"
    homepage: "https://github.com/unbound-force/unbound-force"
    directory: Formula
    # skip_upload: true — GoReleaser generates the formula to dist/ but does
    # not push to the tap. The sign-macos job downloads it, patches darwin
    # checksums with signed values, then pushes the complete formula to
    # homebrew-tap alongside the cask.
    skip_upload: true
    install: |
      bin.install "unbound-force"
      bin.install_symlink "unbound-force" => "uf"
    repository:
      owner: unbound-force
      name: homebrew-tap

homebrew_casks:
  - name: unbound-force
    description: "Unbound Force specification framework toolkit"
    homepage: "https://github.com/unbound-force/unbound-force"
    directory: Casks
    # skip_upload: true — GoReleaser generates the cask to dist/ but does not
    # push to the tap. The sign-macos job downloads it, patches darwin checksums
    # with signed values, then pushes the complete cask to homebrew-tap.
    skip_upload: true
    dependencies:
      - cask: dewey
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/unbound-force"]
            # Create uf symlink alias for daily-use convenience (FR-002/FR-009).
            system_command "/bin/ln", args: ["-sf", "#{staged_path}/unbound-force", "#{HOMEBREW_PREFIX}/bin/uf"]
          end
    repository:
      owner: unbound-force
      name: homebrew-tap
